services:
  backend:
    build:
      dockerfile_inline: |
        FROM nginx:alpine
        RUN echo "backend_build_marker" > /built
    command: sleep infinity
    init: true
  frontend:
    build:
      dockerfile_inline: |
        FROM nginx:alpine
        COPY test /tmp/test
        RUN echo "frontend_build_marker" > /built
    command: sleep infinity
    init: true
    depends_on:
      - backend
    develop:
      watch:
        - path: test
          action: rebuild
