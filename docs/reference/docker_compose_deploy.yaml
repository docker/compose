command: docker compose deploy
short: Deploy a Compose application to a Docker server
long: |-
    Deploy a Compose application to a Docker server.

    This command applies the Compose project to the target Docker server,
    recreating containers with updated configuration and images. Images are
    pulled from the registry unless --build is specified.

    Use health checks defined in the Compose file to ensure zero-downtime
    deployments by passing --wait.
usage: docker compose deploy [OPTIONS] [SERVICE...]
pname: docker compose
plink: docker_compose.yaml
options:
    - option: build
      value_type: bool
      default_value: "false"
      description: Build images before deploying
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
    - option: no-build
      value_type: bool
      default_value: "false"
      description: Do not build images even if build configuration is defined
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
    - option: push
      value_type: bool
      default_value: "false"
      description: Push images to registry before deploying
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
    - option: quiet
      shorthand: q
      value_type: bool
      default_value: "false"
      description: Suppress pull/push progress output
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
    - option: remove-orphans
      value_type: bool
      default_value: "false"
      description: Remove containers for services not defined in the Compose file
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
    - option: wait
      value_type: bool
      default_value: "false"
      description: Wait for services to be healthy before returning
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
    - option: wait-timeout
      value_type: int
      default_value: "0"
      description: |
        Maximum duration in seconds to wait for services to be healthy (0 = no timeout)
      deprecated: false
      hidden: false
      experimental: false
      experimentalcli: false
      kubernetes: false
      swarm: false
inherited_options:
